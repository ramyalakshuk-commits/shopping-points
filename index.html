<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Points - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6e8e17 0%, #4ba282 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        
        .email-signup {
            margin-bottom: 40px;
        }
        
        input[type="email"] {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            width: 300px;
            max-width: 100%;
            font-size: 1rem;
            margin-right: 10px;
        }
        
        button {
            padding: 12px 30px;
            background-color: #ff0101;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #000000;
        }
        
        .footer {
            margin-top: 50px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shopping Points</h1>
        <p>Earn rewards with every purchase!</p>
        <p style="font-size: 1.1rem; margin-bottom: 50px;">Coming Soon</p>
        
        <div class="email-signup">
            <input type="email" placeholder="Enter your Name">
            <button>Notify Me</button>
        </div>
        
        <div class="footer">
            <p>&copy; 2024 Shopping Points. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
